name: release

# Triggered on git tags v* (e.g. v1.3.0). Builds multi-arch images and pushes
# to Docker Hub at healzangels/motif with version-based tags.
#
# REQUIRED REPO SECRETS:
#   DOCKERHUB_USERNAME — your Docker Hub username (healzangels)
#   DOCKERHUB_TOKEN    — a Docker Hub access token (Account Settings → Security)
#
# Tag conventions:
#   git tag -a v1.3.0 -m "release 1.3.0" && git push origin v1.3.0
# This produces image tags:
#   healzangels/motif:1.3.0
#   healzangels/motif:1.3
#   healzangels/motif:1
#   healzangels/motif:latest
# (semver-major-only floats, plus latest, are best-practice for end users.)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. 1.3.0) — for manual builds without a git tag'
        required: true
        default: '0.0.0-dev'

env:
  IMAGE_NAME: healzangels/motif

jobs:
  build-and-push:
    name: build and push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.tag }}"
          else
            # Strip leading 'v' from git tag
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          # Validate semver-ish: MAJOR.MINOR.PATCH (extra suffixes allowed for pre-release)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "::error::Tag '$VERSION' is not semver-compatible (expected MAJOR.MINOR.PATCH)"
            exit 1
          fi
          MAJOR="${VERSION%%.*}"
          MINOR_PATCH="${VERSION#*.}"
          MINOR="${MINOR_PATCH%%.*}"

          {
            echo "version=${VERSION}"
            echo "major=${MAJOR}"
            echo "minor=${MAJOR}.${MINOR}"
          } >> "$GITHUB_OUTPUT"

          echo "Will tag image as:"
          echo "  ${IMAGE_NAME}:${VERSION}"
          echo "  ${IMAGE_NAME}:${MAJOR}.${MINOR}"
          echo "  ${IMAGE_NAME}:${MAJOR}"
          # 'latest' only for non-prerelease versions
          if [[ ! "$VERSION" =~ - ]]; then
            echo "  ${IMAGE_NAME}:latest"
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.minor }}
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.major }}
            ${{ steps.tags.outputs.is_stable == 'true' && format('{0}:latest', env.IMAGE_NAME) || '' }}
          # Cache layers between runs
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Embed the version in image labels
          labels: |
            org.opencontainers.image.title=motif
            org.opencontainers.image.description=Automated theme orchestration for Plex via ThemerrDB
            org.opencontainers.image.version=${{ steps.tags.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Update Docker Hub description
        # Only on stable releases; failure here is non-fatal (the README
        # update is nice-to-have, not blocking)
        if: steps.tags.outputs.is_stable == 'true'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: 'Automated Plex theme song orchestration via ThemerrDB'
          readme-filepath: ./README.md
