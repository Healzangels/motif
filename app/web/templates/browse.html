{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<section class="hero">
  <h1 class="title">{{ title|upper }}</h1>
  <p class="muted">browse · search · re-download · override</p>
</section>

<section class="filterbar">
  <input type="text" id="search-input" placeholder="search title, IMDB id…"
         class="input" autocomplete="off" data-media-type="{{ media_type }}" />
  <div class="chips" role="tablist">
    <button class="chip chip-active" data-status="all">ALL</button>
    <button class="chip" data-status="downloaded">DOWNLOADED</button>
    <button class="chip" data-status="missing">MISSING</button>
    <button class="chip" data-status="placed">PLACED</button>
    <button class="chip" data-status="unplaced">UNPLACED</button>
    <button class="chip" data-status="updates">UPDATES</button>
    <button class="chip chip-warn" data-status="failures">FAILURES</button>
    <button class="chip" data-status="manual">MANUAL</button>
  </div>
</section>

<section class="block">
  <header class="block-head">
    <h2 class="block-title">// RESULTS <span class="muted" id="result-count">…</span></h2>
    <div class="pager" id="pager"></div>
  </header>
  <table class="table" id="items-table">
    <thead>
      <tr>
        <th class="col-state">!</th>
        <th class="col-title">TITLE</th>
        <th class="col-year">YEAR</th>
        <th class="col-state">DL</th>
        <th class="col-state">PL</th>
        <th class="col-state">LINK</th>
        <th class="col-state">SRC</th>
        <th class="col-imdb">IMDB</th>
        <th class="col-actions">ACTIONS</th>
      </tr>
    </thead>
    <tbody id="items-body">
      <tr><td colspan="9" class="muted center">loading…</td></tr>
    </tbody>
  </table>
</section>

<dialog class="dlg" id="item-dlg">
  <article class="dlg-body" id="item-dlg-body">…</article>
</dialog>
{% endblock %}
