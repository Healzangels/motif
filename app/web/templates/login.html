{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="auth-card">
  <div class="auth-card-head">
    <span class="auth-glyph">▰</span>
    <h1 class="auth-title">AUTHENTICATE</h1>
  </div>

  {% if error %}
  <div class="alert alert-error">! {{ error }}</div>
  {% endif %}

  <form method="post" action="/login" class="auth-form">
    <input type="hidden" name="next" value="{{ next }}" />
    <label class="auth-label">USERNAME
      <input class="input" name="username" required autocomplete="username" autofocus />
    </label>
    <label class="auth-label">PASSWORD
      <input class="input" name="password" type="password" required autocomplete="current-password" />
    </label>
    <button type="submit" class="btn">// SIGN IN</button>
  </form>
</section>
{% endblock %}
