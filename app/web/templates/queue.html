{% extends "base.html" %}
{% block title %}Logs{% endblock %}
{% block content %}
<section class="hero">
  <h1 class="title">LOGS</h1>
  <p class="muted">live job queue and event stream</p>
</section>

<section class="block block-split">
  <div class="split-half">
    <header class="block-head">
      <h2 class="block-title">// JOBS</h2>
      <div class="chips chips-inline">
        <button class="chip chip-active" data-jobfilter="all">ALL</button>
        <button class="chip" data-jobfilter="pending">PENDING</button>
        <button class="chip" data-jobfilter="running">RUNNING</button>
        <button class="chip" data-jobfilter="failed">FAILED</button>
        <button class="chip" data-jobfilter="done">DONE</button>
      </div>
    </header>
    <!-- v1.10.37: scroll the jobs list within a fixed-height container so
         the page doesn't grow unbounded with thousands of entries; mirrors
         the event-stream-tall pane on the right. Sticky thead keeps the
         column labels visible while scrolling. -->
    <div class="jobs-scroll">
      <table class="table table-tight">
        <thead>
          <tr><th>ID</th><th>TYPE</th><th>ITEM</th><th>STATE</th><th>TIME</th><th>NOTE</th></tr>
        </thead>
        <tbody id="jobs-body"><tr><td colspan="6" class="muted center">loading…</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="split-half">
    <header class="block-head">
      <h2 class="block-title">// EVENT STREAM</h2>
      <span class="muted live-indicator"><span class="dot dot-pulse"></span> live</span>
    </header>
    <ol class="event-stream event-stream-tall" id="event-stream-full"></ol>
  </div>
</section>
{% endblock %}
